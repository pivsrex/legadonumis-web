    .lg-showcase-media   { height: 220px !important; }

<body>
<div id="root"></div>

<!-- English content — loads window.C before components -->
<script src="./contenido.js"></script>

<script type="text/babel" src="/src/icons.jsx?v=4"></script>
<script type="text/babel" src="/src/numismaticIcons.jsx?v=4"></script>
<script type="text/babel" src="/src/RevealWrapper.jsx?v=4"></script>
<script type="text/babel" src="/src/Navbar.jsx?v=4"></script>
<script type="text/babel" src="/src/Hero.jsx?v=4"></script>
<script type="text/babel" src="/src/Workflow.jsx?v=4"></script>
<script type="text/babel" src="/src/Showcase.jsx?v=4"></script>
<script type="text/babel" src="/src/Features.jsx?v=4"></script>
<script type="text/babel" src="/src/Comparison.jsx?v=4"></script>
<script type="text/babel" src="/src/FAQ_CTA.jsx?v=4"></script>
<script type="text/babel" src="/src/Footer.jsx?v=4"></script>

<script type="text/babel" data-presets="env,react">
window.LANG         = 'en';
window.LANG_ALT_URL = '/';

function App() {
  return (
    <>
      <window.Navbar />
      <main>
        <window.Hero />
        <window.Workflow />
        <window.Showcase />
        <window.Features />
        <window.Comparison />
        <window.FAQ />
        <window.FinalCTA />
      </main>
      <window.Footer />
    </>
  );
}

/* Wait for async Babel fetches to register all components */
(function waitAndRender() {
  const needed = ['Navbar','Hero','Workflow','Showcase','Features','Comparison','FAQ','FinalCTA','Footer'];
  if (needed.every(k => typeof window[k] === 'function')) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      }, 300);
    }
  } else {
    setTimeout(waitAndRender, 20);
  }
})();
</script>
</body>
