<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Contenido editable — carga window.C antes que los componentes -->
<script src="contenido.js"></script>

<script type="text/babel" src="src/icons.jsx?v=3"></script>
<script type="text/babel" src="src/numismaticIcons.jsx?v=3"></script>
<script type="text/babel" src="src/RevealWrapper.jsx?v=3"></script>
<script type="text/babel" src="src/Navbar.jsx?v=3"></script>
<script type="text/babel" src="src/Hero.jsx?v=3"></script>
<script type="text/babel" src="src/Workflow.jsx?v=3"></script>
<script type="text/babel" src="src/Showcase.jsx?v=3"></script>
<script type="text/babel" src="src/Features.jsx?v=3"></script>
<script type="text/babel" src="src/Comparison.jsx?v=3"></script>
<script type="text/babel" src="src/FAQ_CTA.jsx?v=3"></script>
<script type="text/babel" src="src/Footer.jsx?v=3"></script>

<script type="text/babel" data-presets="env,react">
function App() {
  return (
    <>
      <window.Navbar />
      <main>
        <window.Hero />
        <window.Workflow />
        <window.Showcase />
        <window.Features />
        <window.Comparison />
        <window.FAQ />
        <window.FinalCTA />
      </main>
      <window.Footer />
    </>
  );
}

/* Espera a que los fetch() asíncronos de Babel registren todos los componentes */
(function waitAndRender() {
  const needed = ['Navbar','Hero','Workflow','Showcase','Features','Comparison','FAQ','FinalCTA','Footer'];
  if (needed.every(k => typeof window[k] === 'function')) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  } else {
    setTimeout(waitAndRender, 20);
  }
})();
</script>
</body>
